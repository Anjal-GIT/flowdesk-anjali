version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowdesk-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flowdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowdesk-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: flowdesk-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - flowdesk-network

volumes:
  postgres_data:

networks:
  flowdesk-network:
    driver: bridge
